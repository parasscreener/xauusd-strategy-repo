
name: XAUUSD 15Y Backtest

on:
  schedule:
    # Every Sunday at 06:00 UTC (10:00 UAE)
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  xauusd-backtest-15y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 15-year backtest
        run: |
          mkdir -p output
          python scripts/xauusd_strategy.py             --mode backtest             --lookback-years 15             --out-html output/xauusd_backtest_15y_report.html             --out-csv output/xauusd_backtest_15y_table.csv

      - name: Send email with backtest results
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER_ADDRESS }}
          server_port: ${{ secrets.SMTP_SERVER_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "XAUUSD 15Y Strategy Backtest"
          from: "XAUUSD Bot <${{ secrets.MAIL_FROM }}>"
          to: "paras.m.parmar@gmail.com"

          body: |
            XAUUSD 15-year backtest results attached.

            - HTML report: performance summary, equity curve, regime stats
            - CSV: trade-level / period-level metrics for detailed inspection

          attachments: |
            output/xauusd_backtest_15y_report.html,
            output/xauusd_backtest_15y_table.csv
