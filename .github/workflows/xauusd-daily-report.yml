
name: XAUUSD Daily Strategy Report

on:
  schedule:
    # 09:30 UAE (UTC+4) => 05:30 UTC
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  xauusd-daily-report:
    runs-on: ubuntu-latest
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate XAUUSD daily report
        run: |
          mkdir -p output
          python scripts/xauusd_strategy.py             --mode daily-report             --lookback-years 15             --out-html output/xauusd_daily_report.html             --out-csv output/xauusd_daily_table.csv

      - name: Send email with report
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER_ADDRESS }}
          server_port: ${{ secrets.SMTP_SERVER_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "XAUUSD Daily Strategy Report"
          from: "XAUUSD Bot <${{ secrets.MAIL_FROM }}>"
          to: "paras.m.parmar@gmail.com"

          body: |
            XAUUSD daily strategy report attached.

            - HTML report: signal + rationale
            - CSV: full table with all computed columns

          attachments: |
            output/xauusd_daily_report.html,
            output/xauusd_daily_table.csv
